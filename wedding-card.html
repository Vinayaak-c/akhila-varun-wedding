<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Traditional Wedding Invitation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>
        body {

            background: linear-gradient(135deg, #fff8f0, #ffe8ee);

            font-family: Poppins, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;

            padding: 40px;

        }

        .card-box {

            background: white;

            padding: 40px;

            border-radius: 30px;

            max-width: 850px;

            width: 100%;

            text-align: center;

            box-shadow:
                0 20px 60px rgba(0, 0, 0, .15);

            border: 5px solid #d4af37;

        }

        h1 {

            font-family: Cinzel, serif;

            color: #b76e79;

            margin-bottom: 30px;

        }

        .invitation {

            width: 100%;

            border-radius: 20px;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, .15);

            transition: .4s;

        }

        .invitation:hover {

            transform: scale(1.02);

        }

        .btn-custom {

            margin-top: 25px;

            background: linear-gradient(45deg, #d4af37, #b76e79);

            color: white;

            border: none;

            padding: 12px 30px;

            border-radius: 40px;

        }

        .btn-custom:hover {

            color: white;

            transform: translateY(-3px);

        }

        .quote {

            margin: 30px 0;

            font-style: italic;

            color: #666;

        }
    </style>

</head>

<body>

    <div class="card-box">

        <h1>Traditional Wedding Invitation</h1>

        <p class="quote">

            "We request the pleasure of your gracious presence
            to celebrate our wedding."

        </p>

        <img src="wedding-card.jpeg" class="invitation">

        <br>

        <a href="wedding-card.html" download class="btn btn-custom">

            📥 Download Invitation

        </a>

        <a href="index.html" class="btn btn-custom">

            🏠 Back to Website

        </a>

    </div>

</body>

</html>
