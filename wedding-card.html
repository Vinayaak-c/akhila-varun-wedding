<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Traditional Wedding Invitation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>


    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#fffaf5,#ffe8ee);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.container-box{
    width:100%;
    max-width:900px;
    background:#fff;
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

h1{
    font-family:'Cinzel',serif;
    color:#b76e79;
    font-size:2.3rem;
    margin-bottom:10px;
}

.quote{
    color:#666;
    margin-bottom:25px;
    font-style:italic;
    line-height:1.7;
}

.invitation{
    width:100%;
    max-width:700px;
    display:block;
    margin:auto;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.18);
    transition:.4s;
}

.invitation:hover{
    transform:scale(1.02);
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:30px;
}

.btn-custom{
    display:inline-block;
    min-width:220px;
    padding:14px 25px;
    background:linear-gradient(45deg,#d4af37,#b76e79);
    color:#fff;
    text-decoration:none;
    border-radius:50px;
    font-weight:600;
    transition:.3s;
}

.btn-custom:hover{
    color:white;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(183,110,121,.3);
}

footer{
    margin-top:25px;
    color:#777;
    font-size:14px;
}

/* ---------- MOBILE ---------- */

@media (max-width:768px){

body{
    padding:8px;
}

.container-box{
    padding:15px;
    border-radius:15px;
}

h1{
    font-size:1.5rem;
}

.quote{
    font-size:14px;
    margin-bottom:15px;
}

.invitation{
    width:100%;
    max-width:100%;
    border-radius:10px;
}

.buttons{
    flex-direction:column;
    gap:12px;
}

.btn-custom{
    width:100%;
    max-width:320px;
    margin:auto;
    font-size:16px;
    padding:14px;
}

footer{
    font-size:13px;
}

}

</style>

</head>

<body>

<div class="container-box">

<h1>Traditional Wedding Invitation</h1>

<p class="quote">

"We request the pleasure of your gracious presence to bless our wedding ceremony."

</p>

<img src="wedding-card.jpeg"
     alt="Wedding Invitation"
     class="invitation">

<div class="buttons">

<a href="wedding-card.jpeg"
download
class="btn-custom">

📥 Download Invitation

</a>

<a href="index.html"
class="btn-custom">

🏠 Back to Website

</a>

</div>



</div>

</body>
</html>
